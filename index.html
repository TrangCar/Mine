<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>File Search</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <!-- Search -->
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Tìm kiếm...">
    </div>

    <hr>
    <!-- Tags -->
    <div class="tags" id="tagContainer">
        <span class="tag active" data-tag="all">Tất cả</span>
        <span class="tag" data-tag="mc">Các phiên bản MC</span>
        <span class="tag" data-tag="1.16">1.16</span>
        <span class="tag" data-tag="1.17">1.17</span>
        <span class="tag" data-tag="1.18">1.18</span>
        <span class="tag" data-tag="1.19">1.19</span>
    </div>

    <hr>
    <!-- File Grid -->
    <div class="grid" id="fileGrid">
        <!-- Minecraft 1.16.0 -->
        <div class="card"
             onclick="window.location.href='Scripts/MC/1.16/taimc1-16-0.html'"
             data-tags="mc 1.16"
             data-thumb="Scripts/MC/1.16/tai-minecraft-1-16-mien-phi-1.jpg.webp">

            <div class="image"></div>
            <div class="info">
                <h3>Minecraft 1.16.0</h3>
                <p>
                    <span class="file-tag" data-tag="mc">#Các phiên bản MC</span>
                    <span class="file-tag" data-tag="1.16">#1.16</span>
                </p>
            </div>
        </div>

        <!-- Minecraft 1.17.0 -->
        <div class="card"
             onclick="window.location.href='Scripts/MC/1.17/taimc1-17-0.html'"
             data-tags="mc 1.17"
             data-thumb="Scripts/MC/1.17/minecraft-1-17-0-mob-moi.webp">

            <div class="image"></div>
            <div class="info">
                <h3>Minecraft 1.17.0</h3>
                <p>
                    <span class="file-tag" data-tag="mc">#Các phiên bản MC</span>
                    <span class="file-tag" data-tag="1.17">#1.17</span>
                </p>
            </div>
        </div>

        <!-- Minecraft 1.18.0 -->
        <div class="card"
             onclick="window.location.href='Scripts/MC/1.18/taimc1-18-0.html'"
             data-tags="mc 1.18"
             data-thumb="Scripts/MC/1.18/cac-tinh-nang-update-moi-cua-phien-ban-minecraft-1-18-0.webp">

            <div class="image"></div>
            <div class="info">
                <h3>Minecraft 1.18.0</h3>
                <p>
                    <span class="file-tag" data-tag="mc">#Các phiên bản MC</span>
                    <span class="file-tag" data-tag="1.18">#1.18</span>
                </p>
            </div>
        </div>

        <!-- Minecraft 1.19.0 -->
        <div class="card"
             onclick="window.location.href='Scripts/MC/1.19/taimc1-19-0.html'"
             data-tags="mc 1.19"
             data-thumb="Scripts/MC/1.19/vat-pham-va-cong-cu-che-tao-moi.webp">

            <div class="image"></div>
            <div class="info">
                <h3>Minecraft 1.19.0</h3>
                <p>
                    <span class="file-tag" data-tag="mc">#Các phiên bản MC</span>
                    <span class="file-tag" data-tag="1.19">#1.19</span>
                </p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
